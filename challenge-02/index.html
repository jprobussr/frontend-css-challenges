<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge 2</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section class="button-lab">
        <p class="eyebrow">UI Practice</p>
        <h1>Button Lab</h1>
        <p class="intro">
          A small front-end playground for practicing button styles, states, and
          interactions.
        </p>

        <div class="button-row">
          <button class="btn btn-primary" id="code-btn">Start Coding</button>
          <button class="btn btn-secondary">Save Progress</button>
          <button class="btn btn-ghost">Learn More</button>

          <button class="btn btn-primary" disabled>Disabled</button>
          <button class="btn btn-primary" id="load-btn">Submit</button>
          <button class="btn btn-secondary" id="toggleBtn" aria-pressed="false">
            Toggle Panel
          </button>
        </div>

        <div class="info-panel" id="infoPanel">
          <p>
            Nice work - this panel is being controlled by a real toggle button
            with accessible state.
          </p>
        </div>

        <div class="button-group-demo">
            <p class="group-label">Quick Actions</p>

            <div class="button-group">
                <button class="btn btn-secondary">Preview</button>
                <button class="btn btn-secondary">Share</button>
                <button class="btn btn-secondary">Export</button>
            </div>

            <button class="icon-btn" aria-label="Open settings">⚙️</button>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
